<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de administración para gestionar usuarios y configuraciones">
    <title>ConVivir</title>
    <link rel="stylesheet" href="./css/login.css">
    <link rel="shortcut icon" href="./img/LOGO.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="./img/LOGO.png" alt="Logo ConVivir" class="logo">
            <h1>ConVivir</h1>
            <p>Sistema de Gestión de Residentes</p>
        </div>
        
        <form class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> 
                    Usuario
                </label>
                <input type="text" id="user" placeholder="Ingrese su Usuario" >
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> 
                    Contraseña
                </label>
                <input type="password" id="pass" placeholder="Ingrese su contraseña">
                <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
            </div>
            <button class="register-btn" id="init">Iniciar Sesion</button>
        </form>
        <div class="login-footer">
            <p><i class="fas fa-phone-alt"></i> Soporte: 04145553322</p>
            <p><i class="far fa-copyright"></i> 2023 Sistema de Gestión Condominial</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/login_verif.js"></script>
</body>
</html>
